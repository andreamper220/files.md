services:
  files-md:
    build: .
    image: files-md
    ports:
      - "${HTTP_PORT:-80}:8080"
      # - "443:443"   # uncomment with CERT_DIR for HTTPS
    volumes:
      - storage:/app/storage
      - tokens:/app/tokens
      - ./.env:/app/.env:ro
      # Optional: mount Obsidian vault for one-time import (see docs/your-own-server.md)
      # - ${OBSIDIAN_SRC:-./obsidian}:/obsidian:ro
    env_file:
      - .env
    environment:
      APP_URL: ${APP_URL:-http://localhost}
      API_URL: ${API_URL:-http://localhost}
      STORAGE_DIR: /app/storage
      TOKENS_DIR: /app/tokens
      CERT_DIR: ${CERT_DIR:-}
      BOT_API_TOKEN: ${BOT_API_TOKEN:-}
      KIE_API_KEY: ${KIE_API_KEY:-}
      TOKENS_SALT: ${TOKENS_SALT:-}
      STORAGE_QUOTA_KB: ${STORAGE_QUOTA_KB:-0}
      LOG_FILE: /tmp/server.log
    restart: unless-stopped

volumes:
  storage:
  tokens:
